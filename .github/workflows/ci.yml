name: CI/CD Pipeline

on:
  push:
    branches: [ main ] # Tự động chạy khi bạn push code lên main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run Lint & Type Check (Tự động Test)
        run: pnpm turbo lint type-check # Nếu bước này lỗi, quy trình sẽ dừng lại và không deploy
      
      - name: Build project
        run: pnpm turbo build